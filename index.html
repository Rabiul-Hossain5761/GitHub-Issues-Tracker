<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- daisyUi + tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font-awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header class="min-h-screen max-w-md mx-auto pt-5 mt-10 mb-10 shadow-md">
      <div class="w-3/4 mx-auto">
        <div class="flex justify-center">
          <img src="./images/github-logo.png" alt="">
        </div>
        <div class="items-center flex flex-col mt-5">
          <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
          <p>Sign in to manage your issues</p>
        </div>
      </div>
      <div class="w-3/4 mx-auto mt-10">
        <fieldset class="fieldset space-y-2">
          <label class="label font-bold">Username</label>
          <input id="username" type="email" class="input rounded-md" placeholder="username" />
          <label class="label font-bold">Password</label>
          <input id="password" type="password" class="input rounded-md" placeholder="password" />
          <button id="Login-btn" class="btn btn-primary mt-4">Login</button>
        </fieldset>
      </div>
      <div class="w-3/4 mx-auto flex flex-col items-center pt-5 pb-5 mt-5 bg-base-200">
        <h2><span class="font-bold">Username:</span> admin</h2>
        <p><span class="font-bold">Password:</span> admin123</p>
        
      </div>
    </header>
    <script src="js/index.js"></script>
  </body>
</html>
